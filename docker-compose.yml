services:
  arch-fs25server:
    build:
      context: .
      args:
        RELEASETAG: local-build
        TARGETARCH: amd64
    image: arch-fs25server:local
    container_name: arch-fs25server
    environment:
      - VNC_PASSWORD=fs25server
      - PUID=1000
      - PGID=1000
      - WEB_USERNAME=fs25server
      - WEB_PASSWORD=fs25server
      - WEB_DARKMODE=false
      - SERVER_NAME=FS25 Docker
      - SERVER_PASSWORD=fs25server
      - SERVER_ADMIN=fs25server
      - SERVER_PLAYERS=16
      - SERVER_PORT=10823
      - SERVER_REGION=nl
      - SERVER_DIFFICULTY=3
      - SERVER_PAUSE=2
      - SERVER_SAVE_INTERVAL=180.000000
      - SERVER_STATS_INTERVAL=31536000
      - SERVER_CROSSPLAY=true
      - AUTOSTART_SERVER=false
      - ENABLE_STARTUP_SCRIPTS=no
      # --- Steam Setup (beta) ---
      # Uncomment and fill in to use the SteamCMD-based download (SteamSetup desktop icon).
      # The account must own Farming Simulator 25 on Steam.
      #- STEAM_USER=your_steam_username
      #- STEAM_PASS=your_steam_password
      #- STEAM_GUARD_CODE=  # 5-character code from email or authenticator app; leave blank if not needed
      #- STEAM_APP_ID=2300320  # override if GIANTS changes the dedicated-server App ID
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/fs25/config:/opt/fs25/config
      - /opt/fs25/game:/opt/fs25/game
      - /opt/fs25/dlc:/opt/fs25/dlc
      - /opt/fs25/installer:/opt/fs25/installer
    ports:
      - 5900:5900/tcp
      - 6080:6080/tcp
      - 7999:7999/tcp
      - 10823:10823/tcp
      - 10823:10823/udp
    cap_add:
      - SYS_NICE
    restart: unless-stopped
